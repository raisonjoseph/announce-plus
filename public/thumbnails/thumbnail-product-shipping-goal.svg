<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <!-- Background -->
  <rect width="640" height="360" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Product image placeholder -->
  <rect x="36" y="24" width="240" height="312" rx="12" fill="#f3f4f6"/>
  <rect x="106" y="140" width="100" height="14" rx="7" fill="#e5e7eb"/>
  <rect x="126" y="162" width="60" height="10" rx="5" fill="#e5e7eb"/>

  <!-- Product info area -->
  <rect x="308" y="32" width="180" height="16" rx="8" fill="#d1d5db"/>
  <rect x="308" y="56" width="120" height="12" rx="6" fill="#e5e7eb"/>
  <rect x="308" y="80" width="80" height="20" rx="6" fill="#d1d5db"/>

  <!-- Variant selectors -->
  <rect x="308" y="116" width="50" height="28" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <rect x="366" y="116" width="50" height="28" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <rect x="424" y="116" width="50" height="28" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>

  <!-- Quantity -->
  <rect x="308" y="160" width="100" height="32" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>

  <!-- Add to Cart button -->
  <rect x="308" y="206" width="290" height="44" rx="8" fill="#1a1a1a"/>
  <text x="453" y="233" font-size="14" fill="#ffffff" font-family="-apple-system, sans-serif" text-anchor="middle" font-weight="600">Add to cart</text>

  <!-- Buy it now button -->
  <rect x="308" y="258" width="290" height="36" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="453" y="281" font-size="13" fill="#6b7280" font-family="-apple-system, sans-serif" text-anchor="middle">Buy it now</text>

  <!-- Product Shipping Goal bar (the highlight) -->
  <rect x="308" y="304" width="290" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="453" y="322" font-size="11" fill="#15803d" font-family="-apple-system, sans-serif" text-anchor="middle" font-weight="500">Free shipping for orders over $50!</text>
  <rect x="328" y="330" width="250" height="4" rx="2" fill="#dcfce7"/>
  <rect x="328" y="330" width="100" height="4" rx="2" fill="#22c55e"/>
</svg>
