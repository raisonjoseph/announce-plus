# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "512ea10fd2150c887cec1de609c54976"
name = "AnnouncePlus"
application_url = "https://announce-plus.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_metaobjects,read_metaobjects"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
    "https://announce-plus.vercel.app/auth/callback",
    "https://announce-plus.vercel.app/auth/shopify/callback",
    "https://announce-plus.vercel.app/api/auth/callback"
]
